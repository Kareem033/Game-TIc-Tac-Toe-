<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tic Tac Toe Game</title>
    <!-- File Style Css -->
    <link rel="stylesheet" href="style.css" />
    <!-- File Main JS -->
    <script src="main.js" defer></script>
  </head>
  <body>
    <main>
      <header>
        <div class="player" id="xPlayerDisplay" onclick="ChoosePlayer('X')">
          X
        </div>
        <h2 class="titleHeader">Choose</h2>
        <div class="player" id="oPlayerDisplay" onclick="ChoosePlayer('O')">
          O
        </div>
      </header>
      <div id="board">
        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>
      </div>
      <button id="restarBtn">restart</button>
    </main>
  </body>
</html>
